<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style/login.css">
</head>
<body>
    <div class="login__container">
        <div class="login__card">
            <div class="login__header">
                <h2>Login</h2>
                <p>Welcome back! Please enter your details.</p>
            </div>
            
            <form class="login__form" action="" method="post">
                <div class="login__form-group">
                    <label for="username">Username</label>
                    <div class="login__input-wrapper">
                        <input type="text" id="username" name="username" placeholder="Username">
                    </div>
                    <div class="login__error-text">Please enter your username</div>
                </div>
                
                <div class="login__form-group">
                    <label for="password">Password</label>
                    <div class="login__input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Password">
                        <button type="button" class="login__password-toggle" aria-label="Toggle password visibility">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <div class="login__error-text">Please enter your password</div>
                </div>

                <div class="login__options">
                    <label class="login__remember">
                        <input type="checkbox" name="remember">
                        Remember me
                    </label>
                    <a href="#" class="login__forgot">Forgot Password?</a>
                </div>
                
                <button type="submit" class="login__btn">Login</button>
            </form>

            <div class="login__divider">or continue with</div>

            <div class="login__social">
                <button type="button" class="login__social-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/>
                    </svg>
                    Google
                </button>
                <button type="button" class="login__social-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"/>
                    </svg>
                    Facebook
                </button>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
